<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harsh Ballyan — Digital Creative Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--bg:#fff;--sf:#f5f5f5;--sf2:#ebebeb;--dk:#0a0a0a;--dk2:#141414;--ac:#c8f04a;--ac2:#b8e030;--mu:#666;--mi:#888;--br:rgba(0,0,0,.1);--ti:#f0ede8}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--dk);overflow-x:hidden}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1rem 2.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br);backdrop-filter:blur(20px);background:rgba(255,255,255,.93)}
.logo{font-family:"Playfair Display",serif;font-size:1.05rem;color:var(--dk);display:flex;align-items:center;gap:.4rem}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0}
nav ul{list-style:none;display:flex;gap:1.75rem}
nav a{color:var(--mu);text-decoration:none;font-size:.76rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;transition:color .2s}
nav a:hover{color:var(--dk)}
.nc{background:var(--dk);color:#fff!important;padding:.38rem 1.1rem;border-radius:2rem;font-weight:500!important;display:inline-flex;align-items:center;gap:.35rem;transition:background .2s}
.nc:hover{background:var(--ac);color:var(--dk)!important}
/* HERO */
#hero{min-height:100vh;background:var(--dk);color:var(--ti);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:7rem 2.5rem 4rem;gap:2rem;position:relative;overflow:hidden}
#hc{position:absolute;inset:0;z-index:0;pointer-events:none}
.hcont{position:relative;z-index:2}
.hnl{font-size:.7rem;font-weight:500;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
.htag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(200,240,74,.1);border:1px solid rgba(200,240,74,.25);color:var(--ac);font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .8rem;border-radius:2rem;margin-bottom:1.4rem}
.bl{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:bk 2s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.ht{font-family:"Playfair Display",serif;font-size:clamp(2.4rem,4vw,3.8rem);line-height:1.08;color:#fff;margin-bottom:1.2rem}
.ht em{color:var(--ac);font-style:italic}
.hd{color:var(--mi);font-size:.9rem;line-height:1.78;max-width:440px;margin-bottom:2.2rem}
.hbs{display:flex;gap:.8rem;flex-wrap:wrap}
.ba{background:var(--ac);color:#0a0a0a;padding:.65rem 1.45rem;border-radius:2rem;font-weight:500;font-size:.84rem;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;transition:background .2s,transform .15s;border:none;cursor:pointer}
.ba:hover{background:var(--ac2);transform:translateY(-2px)}
.bw{border:1px solid rgba(255,255,255,.18);color:#fff;padding:.65rem 1.45rem;border-radius:2rem;font-size:.84rem;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;transition:border-color .2s,transform .15s}
.bw:hover{border-color:rgba(255,255,255,.5);transform:translateY(-2px)}
.hr{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.3rem}
.pr{width:230px;height:230px;border-radius:50%;border:2px solid rgba(200,240,74,.35);padding:5px;position:relative}
.pr::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:1px dashed rgba(200,240,74,.2);animation:sp 14s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pi{width:100%;height:100%;border-radius:50%;background:#1a1a1a;overflow:hidden}
.pi img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:.8rem;padding:1rem 1.3rem;width:230px}
.hcl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mi);margin-bottom:.45rem}
.hcv{font-weight:500;font-size:.9rem;color:#fff}
.hcs{font-size:.73rem;color:var(--ac);margin-top:.18rem}
/* MARQUEE */
.mq{overflow:hidden;padding:.8rem 0;background:var(--dk);border-top:1px solid rgba(255,255,255,.05)}
.mqi{display:flex;gap:2rem;animation:mqan 22s linear infinite;white-space:nowrap}
@keyframes mqan{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mqit{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#444;display:flex;align-items:center;gap:.6rem}
.mqit::before{content:"✦";color:var(--ac);font-size:.52rem}
/* SECTIONS */
section{padding:4.5rem 2.5rem;position:relative;z-index:1}
.sl{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ac);margin-bottom:.9rem;display:flex;align-items:center;gap:.55rem}
.sl::before{content:"";width:1.3rem;height:1px;background:var(--ac)}
.stit{font-family:"Playfair Display",serif;font-size:clamp(1.75rem,2.6vw,2.5rem);line-height:1.2;margin-bottom:.85rem;color:var(--dk)}
.ssub{color:var(--mu);font-size:.9rem;line-height:1.72;max-width:520px;margin-bottom:2.5rem}
/* 3D */
#interactive{background:var(--dk);text-align:center;display:flex;flex-direction:column;align-items:center;padding:4.5rem 2.5rem}
#interactive .sl{justify-content:center}
#interactive .stit{color:#fff}
#interactive .ssub{color:var(--mi);margin:0 auto 1.4rem}
#tw{width:100%;max-width:780px;height:430px;border-radius:1rem;border:1px solid rgba(255,255,255,.1);overflow:hidden;cursor:grab;margin:0 auto;display:block;position:relative;background:radial-gradient(circle at 35% 25%,rgba(200,240,74,.16),transparent 34%),linear-gradient(145deg,#080808,#121212);touch-action:none}
#tw canvas{display:block;width:100%!important;height:100%!important}
#tw:active{cursor:grabbing}
.th{font-size:.66rem;color:#555;margin-top:.65rem;letter-spacing:.05em}
/* ABOUT */
#about .ag{display:grid;grid-template-columns:1.3fr 1fr;gap:3.5rem;align-items:start}
.at p{color:var(--mu);font-size:.9rem;line-height:1.85;margin-bottom:.9rem}
.at p strong{color:var(--dk)}
.alinks{display:flex;flex-direction:column;gap:.6rem;margin-top:1.5rem}
.alink{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;background:#fff;border:1px solid var(--br);border-radius:.65rem;text-decoration:none;color:var(--dk);font-size:.84rem;transition:border-color .2s,box-shadow .2s}
.alink:hover{border-color:var(--ac);box-shadow:0 0 0 3px rgba(200,240,74,.12)}
.alink .al{color:var(--mu);font-size:.7rem}
.aside{display:flex;flex-direction:column;gap:.9rem}
.sc{background:var(--sf);border:1px solid var(--br);border-radius:.8rem;padding:1.4rem}
.scl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:.7rem}
.scv{font-weight:500;font-size:.92rem;color:var(--dk)}
.scs{font-size:.76rem;color:var(--mu);margin-top:.2rem}
.sr{display:flex;align-items:center;justify-content:space-between;font-size:.8rem;padding:.42rem 0;border-bottom:1px solid var(--br)}
.sr:last-child{border-bottom:none}
.badge{font-size:.65rem;background:rgba(200,240,74,.18);color:#3d5510;border:1px solid rgba(200,240,74,.35);padding:.1rem .48rem;border-radius:2rem}
/* SKILLS */
#skills{background:var(--dk)}
#skills .stit{color:#fff}
#skills .ssub{color:var(--mi)}
.skg{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:1px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);border-radius:.8rem;overflow:hidden}
.skc{background:var(--dk2);padding:1.5rem;transition:background .2s}
.skc:hover{background:#1c1c1c}
.ski{width:36px;height:36px;background:rgba(200,240,74,.1);border:1px solid rgba(200,240,74,.18);border-radius:.4rem;display:flex;align-items:center;justify-content:center;font-size:.9rem;margin-bottom:.9rem}
.skn{font-weight:500;margin-bottom:.28rem;font-size:.88rem;color:#fff}
.skd{font-size:.75rem;color:#555;line-height:1.6}
.skbw{margin-top:.8rem;background:#1a1a1a;border-radius:2rem;height:2px;overflow:hidden}
.skb{height:100%;background:var(--ac);border-radius:2rem;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
/* EXPERIENCE */
#experience .el{max-width:760px}
.ei{display:grid;grid-template-columns:120px 1fr;gap:1.75rem;padding:2rem 0;border-bottom:1px solid var(--br);position:relative}
.ei:last-child{border-bottom:none}
